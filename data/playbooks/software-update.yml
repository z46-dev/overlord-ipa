---
- name: Overlord IPA software update
  hosts: all
  become: true
  gather_facts: true
  tasks:
    - name: Update DNF based systems
      ansible.builtin.dnf:
        name: "*"
        state: latest
      when: ansible_facts.pkg_mgr == "dnf"

    - name: Update APT based systems
      ansible.builtin.apt:
        upgrade: dist
        update_cache: true
      when: ansible_facts.pkg_mgr == "apt"
